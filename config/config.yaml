# ESG Event-Driven Alpha Strategy Configuration

# Data Sources
data:
  # SEC Filing Configuration
  sec:
    company_name: "ESGQuantResearch"
    email: "research@example.com"  # REQUIRED: Your email for SEC EDGAR
    download_folder: "./data/raw/sec_filings"
    filing_types: ["8-K", "10-K", "10-Q"]

  # Price Data Configuration
  prices:
    source: "yfinance"  # yfinance, polygon, quandl
    data_folder: "./data/processed/prices"

  # Social Media Data Configuration
  # Default source: multi_source (combines Arctic Shift + GDELT + StockTwits)
  # Alternatives: arctic_shift, gdelt, stocktwits, reddit, twitter
  social_media:
    source: "multi_source"  # "multi_source", "arctic_shift", "gdelt", "stocktwits", "reddit", "twitter"
    max_posts_per_ticker: 500  # Wider collection for higher confidence (was 300)
    days_before_event: 10  # Wider baseline for reliable volume_ratio (was 7)
    days_after_event: 3   # Event-day + 3 days max (academic event study standard; eliminates look-ahead bias)
    esg_keywords:  # ESG-related keywords (currently ignored - see reddit_fetcher.py)
      - "ESG"
      - "climate"
      - "sustainability"
      - "carbon emissions"
      - "diversity"
      - "governance"

  # Arctic Shift Configuration (Free, no credentials required)
  # Accesses archived Reddit data via https://arctic-shift.photon-reddit.com
  arctic_shift:
    use_mock: false  # Set to true for testing without API calls
    request_timeout: 15  # HTTP request timeout in seconds
    subreddits:  # Subreddits to search (ordered by signal quality)
      - "stocks"
      - "investing"
      - "StockMarket"
      - "wallstreetbets"
      - "ESG_Investing"

  # GDELT Configuration (Free, no credentials required)
  # Global news database monitoring 65+ languages from 2015+
  # API: https://blog.gdeltproject.org/gdelt-doc-2-0-api-version-2/
  gdelt:
    use_mock: false  # Set to true for testing without API calls
    request_timeout: 30  # HTTP request timeout in seconds
    max_articles: 100  # More articles for richer sentiment signal (was 50)

  # StockTwits Configuration (Free, no credentials required)
  # Stock social media with native bullish/bearish sentiment
  # API: https://api.stocktwits.com/api/2/streams/symbol/{ticker}.json
  # Note: Only returns recent messages (no historical date filtering)
  stocktwits:
    use_mock: false  # Set to true for testing without API calls
    request_timeout: 15  # HTTP request timeout in seconds
    max_pages: 10  # More pages for deeper sentiment history (was 5)

  # Multi-Source Configuration
  # Combines multiple sources for richer sentiment data
  multi_source:
    sources:  # Sources to combine (all free, no credentials)
      - "arctic_shift"
      - "gdelt"
      - "stocktwits"

  # Reddit API Configuration (requires API credentials)
  # NOTE: Set credentials in .env file, NOT here. See .env.example for template.
  reddit:
    client_id: "${REDDIT_CLIENT_ID}"  # Load from environment variable
    client_secret: "${REDDIT_CLIENT_SECRET}"  # Load from environment variable
    user_agent: "ESG Sentiment Trading Bot 1.0"
    use_mock: false  # Set to true if no Reddit API credentials available
    subreddits:  # Subreddits to monitor (r/sustainableinvesting removed - returns 404)
      - "stocks"
      - "investing"
      - "StockMarket"
      - "wallstreetbets"
      - "ESG_Investing"

  # Twitter/X API Configuration (Free tier: 7 days history only)
  twitter:
    bearer_token: ""  # Twitter API v2 Bearer Token
    use_mock: true  # Set to false when you have Twitter API token

  # Fama-French Factors
  factors:
    data_folder: "./data/processed/factors"
    frequency: "daily"  # daily or monthly

# NLP Configuration
nlp:
  # Event Detection
  event_detector:
    type: "rule_based"  # rule_based or ml
    ml_model: "yiyanghkust/finbert-esg"  # Only used if type=ml
    # NOTE: This threshold should be validated via walk-forward testing
    # AUDIT WARNING: "LOWERED to increase trade count" is look-ahead bias
    # Use validation framework to find optimal threshold on training data only
    confidence_threshold: 0.25

  # Sentiment Analysis
  sentiment_analyzer:
    model: "ProsusAI/finbert"  # ProsusAI/finbert, yiyanghkust/finbert-tone
    batch_size: 32

# Signal Generation
signals:
  # Composite Score Weights
  # AUDIT REFACTOR (Jan 2026): Weights can now be derived statistically
  # Set weight_derivation_method to control how weights are determined:
  #   - "fixed": Use the weights below (legacy behavior)
  #   - "equal": Equal weight across all components
  #   - "inverse_variance": Weight inversely proportional to component variance
  #   - "correlation": Weight proportional to return correlation (requires validation)
  weight_derivation_method: "inverse_variance"  # RECOMMENDED: data-driven weights

  # Fixed weights (used when weight_derivation_method="fixed")
  # Note: These are legacy values - prefer statistical derivation
  weights:
    event_severity: 0.20
    intensity: 0.40
    volume: 0.25
    duration: 0.15
    sentiment_volume_momentum: 0.0  # Removed: was double-counting intensity

  # Signal Parameters
  lookback_window: 252  # Days for z-score calculation and weight calibration
  sentiment_threshold: 0.05  # Minimum sentiment for directional signal

  # Quality Filters
  # These ensure signals come from real data with sufficient coverage
  quality_filters:
    min_intensity: 0.05      # Minimum |sentiment| for signal
    min_volume_ratio: 0.3    # Preserves signal quality (lower vol events are 73% bearish)
    min_posts: 5             # Minimum posts for reliable sentiment consensus (research: 5+)
    require_social_data: true  # Require social media validation
    min_confidence: 0.0      # Confidence floor (0 = no filter)
    balance_long_short: true  # Force balanced L/S to prevent directional blowup

# Walk-Forward Validation Configuration (AUDIT ADDITION Jan 2026)
# CRITICAL: Use this to validate strategy before deployment
# Walk-forward prevents look-ahead bias by training/testing on separate time periods
validation:
  enabled: true  # Enable walk-forward validation
  min_train_months: 12  # Minimum training period (months)
  test_months: 3  # Out-of-sample test period (months)
  step_months: 3  # Step size between validation folds
  embargo_days: 5  # Gap between train/test to prevent data leakage

  # Acceptance criteria for strategy deployment
  acceptance_criteria:
    min_oos_sharpe: 0.0  # Minimum out-of-sample Sharpe ratio (positive)
    min_overfit_ratio: 0.4  # test_sharpe / train_sharpe (detect overfitting)
    min_profitable_folds: 0.5  # At least 50% of folds must be profitable

  # Weight derivation for validation
  weight_method: "inverse_variance"  # Method used during walk-forward

# Risk Management Configuration (AUDIT REFACTOR Jan 2026)
# Thresholds can now be derived from historical data instead of hard-coded
risk_management:
  enabled: true

  # Position sizing
  max_position_size: 0.25  # 25% max — optimal for concentrated ESG event-driven (25% peak, 26%+ triggers drawdown cliff)
  min_positions: 2  # Realistic for sparse ESG event-driven strategy

  # Volatility targeting
  target_volatility: 0.18  # 18% for event-driven strategies (Pedersen 2015: event-driven vol = 15-25%)
  volatility_lookback: 20  # Days for vol calculation

  # Drawdown control
  # AUDIT: Set adaptive_thresholds=true to derive from historical data
  adaptive_thresholds: true  # Derive thresholds from actual drawdown distribution
  max_drawdown_threshold: 0.15  # 15% max (used if adaptive_thresholds=false)

  # Cash equitization regime filter (Faber 2007, Ang 2014)
  cash_equitization:
    regime_aware: true          # Enable regime-aware equitization
    sma_lookback: 100           # 100-day SMA for regime detection (faster recovery detection)
    bear_equitization_pct: 0.40 # 40% equitization in bear regime (vs 100% in bull)

  # Circuit breaker for scandals/flash crashes
  circuit_breaker:
    enabled: true
    volume_spike_threshold: 5.0  # 5x normal volume triggers alert
    sentiment_crash_threshold: -0.5  # Sentiment drop triggers alert
    halt_duration_hours: 24  # Default halt duration

  # Data quality monitoring
  data_quality:
    min_coverage_ratio: 0.5  # Minimum data coverage to continue trading
    stale_data_hours: 24  # Hours without data before reducing positions

# Portfolio Construction
portfolio:
  strategy_type: "long_short"  # long_short, long_only, short_only
  method: "quintile"  # CHANGED: quintile for discrete ranking (z_score caused issues with sparse data)
  max_position: 0.08  # 8% for concentrated high-conviction positions
  rebalance_frequency: "W"  # Weekly - optimal for ESG event frequency
  holding_period: 49  # 7 weeks / ~35 trading days: captures full ESG alpha cycle
  # Flammer (2013): CARs continue 30-60 trading days post-CSR event
  # Khan, Serafeim & Yoon (2016): material ESG alpha persists quarterly
  # Captures: primary alpha (5-10d) + diffusion (10-20d) + institutional (20-35d)
  balance_long_short: true  # CHANGED: Force balanced to prevent 8:1 short bias

# Backtesting Configuration
backtest:
  initial_capital: 1000000.0  # Starting capital ($1M)
  commission_pct: 0.0005  # 5 basis points
  slippage_bps: 3  # 3 basis points
  start_date: "2020-01-01"
  end_date: "2023-12-31"

# Universe Configuration
universe:
  index: "SP500"  # SP500, Russell1000, custom
  min_market_cap: 1000000000  # $1B minimum
  min_liquidity: 1000000  # $1M average daily volume

# Output Configuration
output:
  results_folder: "./results"
  figures_folder: "./results/figures"
  tear_sheets_folder: "./results/tear_sheets"
  factor_analysis_folder: "./results/factor_analysis"
  save_format: "pickle"  # pickle, json, csv

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "./logs/esg_strategy.log"
