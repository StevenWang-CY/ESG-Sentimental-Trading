# ESG Event-Driven Alpha Strategy Configuration

# Data Sources
data:
  # SEC Filing Configuration
  sec:
    company_name: "ESGQuantResearch"
    email: "research@example.com"  # REQUIRED: Your email for SEC EDGAR
    download_folder: "./data/raw/sec_filings"
    filing_types: ["8-K", "10-K", "10-Q"]

  # Price Data Configuration
  prices:
    source: "yfinance"  # yfinance, polygon, quandl
    data_folder: "./data/processed/prices"

  # Social Media Data Configuration
  # Default source: Reddit (better for historical data, no API restrictions)
  # Alternative: Twitter (limited to 7 days history on free tier)
  social_media:
    source: "reddit"  # "reddit" or "twitter"
    max_posts_per_ticker: 300  # INCREASED to 300 for richer sentiment data (revised strategy)
    days_before_event: 3  # RESTORED to 3 - event-proximate window (captures acute reaction)
    days_after_event: 7  # RESTORED to 7 - optimal for ESG sentiment diffusion
    esg_keywords:  # ESG-related keywords (currently ignored - see reddit_fetcher.py)
      - "ESG"
      - "climate"
      - "sustainability"
      - "carbon emissions"
      - "diversity"
      - "governance"

  # Reddit API Configuration (Free, unlimited historical access)
  reddit:
    client_id: "lGmL5_M2TWsCAoH_F_ClLQ"  # Real Reddit API credentials
    client_secret: "dXwV6MG2rQnix99kVjYL59HpShwdWg"
    user_agent: "ESG Sentiment Trading Bot 1.0"
    use_mock: false  # Using REAL Reddit API data!
    subreddits:  # Subreddits to monitor (r/sustainableinvesting removed - returns 404)
      - "stocks"
      - "investing"
      - "StockMarket"
      - "wallstreetbets"
      - "ESG_Investing"

  # Twitter/X API Configuration (Free tier: 7 days history only)
  twitter:
    bearer_token: ""  # Twitter API v2 Bearer Token
    use_mock: true  # Set to false when you have Twitter API token

  # Fama-French Factors
  factors:
    data_folder: "./data/processed/factors"
    frequency: "daily"  # daily or monthly

# NLP Configuration
nlp:
  # Event Detection
  event_detector:
    type: "rule_based"  # rule_based or ml
    ml_model: "yiyanghkust/finbert-esg"  # Only used if type=ml
    confidence_threshold: 0.50  # RAISED to 0.50 for high-quality events only (evidence-based optimization)

  # Sentiment Analysis
  sentiment_analyzer:
    model: "ProsusAI/finbert"  # ProsusAI/finbert, yiyanghkust/finbert-tone
    batch_size: 32

# Signal Generation
signals:
  # Composite Score Weights (Research-Optimized: Volume drives price impact for mid-caps)
  weights:
    event_severity: 0.35  # ESG event quality is critical
    intensity: 0.25       # Reduced (61% signals were neutral)
    volume: 0.35          # INCREASED - academic research shows volume predicts returns
    duration: 0.05        # Minimal predictive power

  # Signal Parameters
  lookback_window: 252  # Days for z-score calculation

# Portfolio Construction
portfolio:
  strategy_type: "long_short"  # long_short, long_only, short_only
  method: "z_score"  # z_score for continuous ranking (evidence-based)
  max_position: 0.08  # INCREASED to 8% for concentrated high-conviction positions
  rebalance_frequency: "W"  # Weekly - optimal for ESG event frequency
  holding_period: 12  # INCREASED to 12 days (academic optimal: 10-20 days for ESG diffusion)

# Backtesting Configuration
backtest:
  initial_capital: 1000000.0  # Starting capital ($1M)
  commission_pct: 0.0005  # 5 basis points
  slippage_bps: 3  # 3 basis points
  start_date: "2020-01-01"
  end_date: "2023-12-31"

# Universe Configuration
universe:
  index: "SP500"  # SP500, Russell1000, custom
  min_market_cap: 1000000000  # $1B minimum
  min_liquidity: 1000000  # $1M average daily volume

# Output Configuration
output:
  results_folder: "./results"
  figures_folder: "./results/figures"
  tear_sheets_folder: "./results/tear_sheets"
  factor_analysis_folder: "./results/factor_analysis"
  save_format: "pickle"  # pickle, json, csv

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "./logs/esg_strategy.log"
